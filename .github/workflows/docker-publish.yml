name: Build and Push Docker Image

on:
  push:
    branches: [v3]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          docker buildx build \
            --load \
            --provenance=false \
            --sbom=false \
            -f web/web/Dockerfile \
            -t mysticdicc/homelab-dashboard:alpha .
          docker push mysticdicc/homelab-dashboard:alpha